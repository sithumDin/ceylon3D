version: '3.8'
services:
  db:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - db_data:/data/db

  app:
    build: .
    depends_on:
      - db
    ports:
      - "8080:8080"
    environment:
      - SPRING_DATA_MONGODB_URI=mongodb://db:27017/ceylon3d
      - JWT_SECRET=change-me-super-secret-change-me-super-secret
      - JWT_EXPIRATIONMS=86400000
    restart: unless-stopped

volumes:
  db_data:
