spring:
  servlet:
    multipart:
      enabled: true
      max-file-size: 50MB
      max-request-size: 50MB
  data:
    mongodb:
      uri: ${SPRING_DATA_MONGODB_URI:mongodb://localhost:27017/ceylon3d}
      auto-index-creation: true

server:
  port: ${SERVER_PORT:8080}

jwt:
  secret: ${JWT_SECRET:change-me-super-secret-change-me-super-secret}
  expirationMs: ${JWT_EXPIRATIONMS:86400000}

logging:
  level:
    com.university.itp: DEBUG
  file:
    name: /tmp/ceylon3d-backend.log
