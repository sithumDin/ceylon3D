spring:
  servlet:
    multipart:
      enabled: true
      max-file-size: 50MB
      max-request-size: 50MB
  datasource:
    url: jdbc:h2:mem:ceylon3ddb
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        format_sql: true
    show-sql: true
    database-platform: org.hibernate.dialect.H2Dialect
  sql:
    init:
      mode: never
      data-locations: classpath:data-h2.sql

server:
  port: 8080

jwt:
  secret: change-me-super-secret-change-me-super-secret
  expirationMs: 86400000

logging:
  level:
    com.university.itp: DEBUG
  file:
    name: /tmp/ceylon3d-backend.log
